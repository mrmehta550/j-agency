<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Empty state illustration -->
  <rect width="200" height="200" fill="#f0f4f8"/>
  
  <!-- Folder icon -->
  <g transform="translate(50, 40)">
    <rect x="5" y="15" width="90" height="70" rx="5" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M 5 15 L 25 5 L 35 5 L 35 15" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  
  <!-- Magnifying glass icon -->
  <g transform="translate(80, 65)">
    <circle cx="15" cy="15" r="12" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="25" y1="25" x2="32" y2="32" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="140" text-anchor="middle" font-size="14" fill="#64748b" font-family="Arial">No data found</text>
</svg>
