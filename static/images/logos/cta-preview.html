<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTA Section Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-space:#0a0e1d;
    --bg-space-2:#12172c;
    --flame:#ff6a3d;
    --flame-soft:#ffab7a;
    --orbit:#7c6ff0;
    --ink:#f4f2ec;
    --muted:#a3a9bf;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#05070f;font-family:'Inter',sans-serif;}

  .cta-section{
    position:relative;
    padding:120px 24px;
    background:
      radial-gradient(ellipse 60% 50% at 78% 30%, rgba(124,111,240,0.18), transparent 60%),
      radial-gradient(ellipse 70% 60% at 15% 80%, rgba(255,106,61,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-space) 0%, var(--bg-space-2) 100%);
    overflow:hidden;
  }
  .cta-section::before{
    /* faint starfield */
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 20%, rgba(255,255,255,0.5) 50%, transparent),
      radial-gradient(1.5px 1.5px at 60% 10%, rgba(255,255,255,0.35) 50%, transparent),
      radial-gradient(1px 1px at 80% 40%, rgba(255,255,255,0.4) 50%, transparent),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3) 50%, transparent),
      radial-gradient(1.5px 1.5px at 90% 80%, rgba(255,255,255,0.4) 50%, transparent),
      radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.25) 50%, transparent),
      radial-gradient(1px 1px at 10% 55%, rgba(255,255,255,0.3) 50%, transparent);
    opacity:0.6;
    pointer-events:none;
  }

  .container{max-width:1200px;margin:0 auto;position:relative;z-index:2;}

  .cta-wrapper{
    display:grid;
    grid-template-columns:1.05fr 0.95fr;
    align-items:center;
    gap:48px;
  }

  /* ---- copy side ---- */
  .cta-content{max-width:560px;}

  .section-tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'Space Grotesk',sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.14em;
    color:var(--flame-soft);
    text-transform:uppercase;
    margin-bottom:22px;
  }
  .section-tag::before{
    content:"";
    width:16px; height:1.5px;
    background:var(--flame);
  }

  .cta-content h2{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:clamp(30px, 3.6vw, 46px);
    line-height:1.14;
    color:var(--ink);
    letter-spacing:-0.01em;
    margin-bottom:24px;
  }

  .cta-content p{
    font-size:16.5px;
    line-height:1.7;
    color:var(--muted);
    margin-bottom:40px;
    max-width:460px;
  }

  .cta-buttons{
    width:100%;
    flex-wrap:wrap;
    gap:16px;
  }

  .btn-primary, .btn-outline{
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    font-weight:600;
    padding:15px 30px;
    border-radius:999px;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    transition:transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
  }

  .btn-primary{
    background:linear-gradient(135deg, var(--flame) 0%, #ff8c4d 100%);
    color:#0a0e1d;
    box-shadow:0 8px 24px -8px rgba(255,106,61,0.6);
  }
  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px -8px rgba(255,106,61,0.75);
  }

  .btn-outline{
    background:transparent;
    color:var(--ink);
    border:1px solid rgba(244,242,236,0.25);
  }
  .btn-outline:hover{
    border-color:rgba(244,242,236,0.6);
    background:rgba(244,242,236,0.06);
    transform:translateY(-2px);
  }

  /* ---- visual side ---- */
  .cta-image{
    position:relative;
    width:100%;
    align-items:center;
    justify-content:center;
    aspect-ratio:1/1;
    max-width:520px;
    margin:0 auto;
  }

  .cta-image .circle{
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(124,111,240,0.28);
    pointer-events:none;
  }
  .cta-image .circle.one{
    width:78%; height:78%;
    animation:orbit-pulse 6s ease-in-out infinite;
  }
  .cta-image .circle.two{
    width:96%; height:96%;
    border-color:rgba(124,111,240,0.16);
    animation:orbit-pulse 6s ease-in-out infinite 1.2s;
  }
  .cta-image .circle.three{
    width:114%; height:114%;
    border-color:rgba(255,106,61,0.14);
    border-style:dashed;
    animation:orbit-spin 40s linear infinite;
  }

  @keyframes orbit-pulse{
    0%,100%{ opacity:0.5; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.035); }
  }
  @keyframes orbit-spin{
    to{ transform:rotate(360deg); }
  }

  .cta-image video{
    position:relative;
    width:88%;
    border-radius:50%;
    aspect-ratio:1/1;
    object-fit:cover;
    z-index:2;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 30px 70px -20px rgba(0,0,0,0.65),
      0 0 90px -20px rgba(255,106,61,0.35);
  }

  @media (prefers-reduced-motion: reduce){
    .cta-image .circle{ animation:none; }
  }

  /* ---- responsive ---- */
  @media (max-width: 900px){
    .cta-wrapper{
      grid-template-columns:1fr;
      text-align:center;
    }
    .cta-content{margin:0 auto;}
    .cta-content p{margin-left:auto;margin-right:auto;}
    .cta-buttons{justify-content:center;}
    .cta-image{order:-1; max-width:340px; margin-bottom:16px;}
  }

  @media (max-width: 480px){
    .cta-section{padding:80px 20px;}
    .cta-buttons{flex-direction:column; width:100%;}
    .btn-primary, .btn-outline{justify-content:center;}
  }
</style>
</head>
<body>

<section class="cta-section">
    <div class="container">
        <div class="cta-wrapper">
            <div class="cta-content">
                <span class="section-tag">
                    LET'S BUILD TOGETHER
                </span>
                <h2>
                    Ready To Grow Your Business
                    With Digital Innovation?
                </h2>
                <p>
                    Whether you're launching a startup,
                    upgrading your website,
                    building an AI product,
                    or scaling your business,
                    our team is here to help.
                </p>
                <div class="cta-buttons">
                    <a href="#" class="btn-primary">
                        Book Free Consultation
                    </a>
                    <a href="#" class="btn-outline">
                        Contact Us
                    </a>
                </div>
            </div>
            <div class="cta-image">
                <div class="circle one"></div>
                <div class="circle two"></div>
                <div class="circle three"></div>
                <video
                    autoplay
                    loop
                    muted
                    playsinline
                    poster="cta-animation-poster.jpg">
                    <source src="cta-animation.webm" type="video/webm">
                    <source src="cta-animation.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>
</section>

</body>
</html>
