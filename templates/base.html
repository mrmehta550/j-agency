<body>

    {% include "base/nav.html" %}

    {% block content %}

    {% endblock %}

    {% include "base/footer.html" %}

    {% comment %} <script>
        document.addEventListener('DOMContentLoaded', () => {
            // interactive visuals (guarded)
            document.querySelectorAll('.visual-card').forEach((card) => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    card.style.transform = `translateY(-8px) scale(1.02) rotateX(${(-y * 0.05).toFixed(2)}deg) rotateY(${(x * 0.05).toFixed(2)}deg)`;
                });
                card.addEventListener('mouseleave', () => { card.style.transform = ''; });
            });

            // services slider (guarded)
            (function initSlider() {
                const slider = document.querySelector('.services-grid');
                const cards = document.querySelectorAll('.service-card');
                const next = document.querySelector('.right');
                const prev = document.querySelector('.left');
                if (!slider || cards.length === 0 || !next || !prev) return;

                let index = 0;
                const cardWidth = cards[0].offsetWidth + 25;
                const moveSlider = () => { slider.style.transform = `translateX(-${index * cardWidth}px)`; };

                next.addEventListener('click', () => {
                    index++;
                    if (index > cards.length - 3) index = 0;
                    moveSlider();
                });

                prev.addEventListener('click', () => {
                    index--;
                    if (index < 0) index = Math.max(0, cards.length - 3);
                    moveSlider();
                });

                setInterval(() => { index = (index + 1) % Math.max(1, cards.length - 2); moveSlider(); }, 3000);
            })();
        }); {% endcomment %}
    </script>
    <script src="{% static 'js/nav.js' %}"></script>
    <script src="{% static 'js/index.js' %}"></script>

    {% comment %} <script src="{% static 'js/maint.js' %}"></script> {% endcomment %}
